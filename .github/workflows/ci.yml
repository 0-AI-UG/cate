name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    # Without this, a hung step (e.g. a test leaving a child process that holds
    # the step's stdout pipe open) runs until GitHub's 6-hour default. Bound it
    # so CI fails fast and surfaces the culprit instead of hanging for hours.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools (needed by node-gyp)
        run: pip install setuptools

      - name: Delete lockfile
        run: node -e "try{require('fs').unlinkSync('package-lock.json')}catch{}"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Electron smoke test (macOS only)
        if: matrix.os == 'macos-latest'
        run: npm run test:smoke:electron

      # The companion tarball build stages node-pty's native binary from
      # build/Release (its own compiled output), but a plain `npm install` on the
      # runner satisfies node-pty from a shipped prebuild and never populates
      # build/Release. Compile it from source so the tarball build finds it.
      # (node-pty is N-API, so the node-20-compiled binary runs under the
      # tarball's bundled node-22 runtime.)
      - name: Compile node-pty for the companion tarball (macOS)
        if: matrix.os == 'macos-latest'
        run: npm rebuild node-pty --build-from-source

      # The content-search e2e specs exercise the real local companion daemon,
      # whose ripgrep ships inside the host companion tarball (runtime/bin/rg).
      # `electron-vite build` doesn't produce that tarball, so build it natively
      # on this runner first (same as release.yml) — otherwise the daemon has no
      # rg and every content search returns zero results. (Self-builds pi.)
      - name: Build companion tarball (macOS, for e2e search)
        if: matrix.os == 'macos-latest'
        run: node scripts/build-companion-tarball.mjs

      # Functional drag/dock/detach e2e. Runs windowless on macOS (no display
      # server needed); the perf-stress spec is skipped via E2E_SKIP_PERF since
      # its thresholds depend on raw runner speed.
      - name: E2E tests (macOS only)
        if: matrix.os == 'macos-latest'
        run: npm run test:e2e:ci
