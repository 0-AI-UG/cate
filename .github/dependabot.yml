version: 2

updates:
  # npm — the app itself. Alerts were already on, but with no config here
  # nothing ever opened a PR, so patched versions sat unapplied.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # One PR per cluster instead of a dozen. Keeps the lockfile churn
      # reviewable and avoids a queue of near-identical bumps. Every
      # update-type is covered by some group: anything left ungrouped gets
      # its own PR, which is how the actions bumps turned into five.
      dev-tooling:
        dependency-type: development
        update-types: [minor, patch]
      production-minor-patch:
        dependency-type: production
        update-types: [minor, patch]
      majors:
        patterns: ["*"]
        update-types: [major]
    ignore:
      # pi ships breaking API changes in patch releases (0.80.10 removed the
      # pi-ai/oauth exports src/agent/main/authManager.ts imports), so these
      # are pinned exact in package.json and bumped by hand after checking
      # the API still lines up. Automated bumps here would just break CI.
      - dependency-name: "@earendil-works/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      # Five actions in the tree, so an ungrouped config opens five PRs and
      # then stops at the default limit of 5. One PR for the lot instead.
      actions:
        patterns: ["*"]
