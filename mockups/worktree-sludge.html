<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cate · Worktree Territory — dot grid</title>
<style>
  :root { --bg:#0f1318; --gridline:rgba(255,255,255,0.05); --griddot:rgba(255,255,255,0.10);
    --panel:#1b2027; --panel-bar:#232a33; --border:rgba(255,255,255,0.10); --text:#c9d2dc; --muted:#8a94a2; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text);
    font:13px/1.4 ui-sans-serif,-apple-system,system-ui,sans-serif; }
  #stage { position:fixed; inset:0; overflow:hidden; cursor:grab; }
  #stage.panning { cursor:grabbing; }
  #base { position:absolute; inset:0; pointer-events:none; z-index:0; }
  #fx   { position:absolute; inset:0; pointer-events:none; z-index:1; }
  #world{ position:absolute; top:0; left:0; transform-origin:0 0; z-index:2; }
  .panel { position:absolute; border-radius:9px; background:var(--panel);
    border:1.5px solid var(--border); box-shadow:0 14px 40px -16px rgba(0,0,0,0.6); overflow:hidden; user-select:none; }
  .panel .bar { height:24px; display:flex; align-items:center; gap:6px; padding:0 8px;
    background:var(--panel-bar); border-bottom:1px solid var(--border); cursor:grab; font-size:11px; }
  .panel .bar .chip { margin-left:auto; display:inline-flex; align-items:center; gap:4px; height:16px;
    padding:0 8px 0 6px; border-radius:8px; color:#fff; font-size:9px; font-weight:700; text-shadow:0 1px 1px rgba(0,0,0,.3); }
  .panel .bar .chip svg { width:9px; height:9px; }
  .panel .body { padding:8px 10px; color:var(--muted); font:11px/1.5 ui-monospace,Menlo,monospace; }

  #ui { position:fixed; top:14px; left:14px; z-index:10; width:250px; background:rgba(18,22,28,.94);
    backdrop-filter:blur(10px); border:1px solid var(--border); border-radius:12px; padding:13px 14px;
    box-shadow:0 18px 50px -18px rgba(0,0,0,.7); }
  #ui h1 { font-size:12px; font-weight:700; letter-spacing:.3px; }
  #ui .sub { color:var(--muted); font-size:10.5px; margin:2px 0 11px; }
  .seg { display:flex; gap:6px; margin-bottom:12px; }
  .seg button { flex:1; padding:7px 0; border-radius:8px; border:1px solid var(--border);
    background:rgba(255,255,255,.04); color:var(--text); font-size:11px; cursor:pointer; }
  .seg button.on { background:#10b981; border-color:#10b981; color:#06231a; font-weight:700; }
  .row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:8px 0; }
  .row label { color:var(--muted); font-size:11px; }
  .row output { color:var(--text); font-variant-numeric:tabular-nums; font-size:10.5px; min-width:36px; text-align:right; }
  input[type=range] { width:120px; accent-color:#10b981; }
  .hint { color:var(--muted); font-size:10px; margin-top:11px; line-height:1.5; }
  .fps { position:fixed; top:14px; right:14px; z-index:10; font:11px ui-monospace,monospace; color:var(--muted);
    background:rgba(18,22,28,.85); border:1px solid var(--border); padding:5px 9px; border-radius:8px; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="base"></canvas>
    <canvas id="fx"></canvas>
    <div id="world"></div>
  </div>

  <div id="ui">
    <h1>Worktree Territory</h1>
    <div class="sub">dot grid · direct per-dot coloring · zero blur</div>
    <div class="seg" id="baseMode">
      <button data-b="dots" class="on">Dots only</button>
      <button data-b="lines">Lines + dots</button>
    </div>
    <div class="row"><label>Reach</label><input id="reach" type="range" min="40" max="420" value="200"><output id="reachv"></output></div>
    <div class="row"><label>Edge falloff</label><input id="soft" type="range" min="60" max="400" value="180"><output id="softv"></output></div>
    <div class="row"><label>Intensity</label><input id="intensity" type="range" min="20" max="100" value="95"><output id="intensityv"></output></div>
    <div class="row"><label>Dot size</label><input id="dot" type="range" min="8" max="40" value="20"><output id="dotv"></output></div>
    <div class="row"><label>Bounce</label><input id="spring" type="range" min="6" max="40" value="22"><output id="springv"></output></div>
    <div class="hint">Drag a title bar to move a panel · drag bg to pan · scroll to zoom.<br>Idle = 0 redraws. Watch the FPS while dragging.</div>
  </div>
  <div class="fps" id="fps">idle</div>

<script>
const COLORS = { a:'#10b981', b:'#f59e0b', c:'#3b82f6' };
const LABEL  = { a:'slave', b:'slave-2', c:'feature-x' };
const ICON = '<svg viewBox="0 0 256 256" fill="currentColor"><path d="M104 56a32 32 0 1 0-40 31v82a32 32 0 1 0 16 0V87a31.9 31.9 0 0 0 15.4-10.7 80.4 80.4 0 0 0 50.2 70.2A32 32 0 1 0 192 169V120a80.3 80.3 0 0 0-58.2-77A16 16 0 0 1 120 56a16 16 0 1 0-16 0Z"/></svg>';

let panels = [
  { x:120, y:200, w:300, h:200, wt:'a', t:'Terminal 1' },
  { x:520, y:110, w:320, h:210, wt:'a', t:'Terminal 2' },
  { x:470, y:430, w:330, h:210, wt:'b', t:'Terminal 3' },
  { x:880, y:300, w:320, h:210, wt:'b', t:'Terminal 4' },
  { x:980, y:600, w:300, h:190, wt:'c', t:'Agent' },
].map(p => ({ ...p, sx:p.x, sy:p.y, vx:0, vy:0 }));

const world = { ox:0, oy:0, scale:1 };
// reach/soft are in WORLD px (so territory scales with zoom like the panels do).
const P = { base:'dots', reach:200, soft:180, intensity:0.95, dot:0.20, spring:0.22 };
const STEP = 40; // world-space grid step

const stage = document.getElementById('stage');
const worldEl = document.getElementById('world');
const fx = document.getElementById('fx'); const ctx = fx.getContext('2d');
const base = document.getElementById('base'); const bctx = base.getContext('2d');
let DPR = Math.min(devicePixelRatio||1, 2), W=0, H=0;

function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
  for(const c of [fx,base]){ c.width=W*DPR; c.height=H*DPR; }
  for(const x of [ctx,bctx]) x.setTransform(DPR,0,0,DPR,0,0);
  fx.style.width=base.style.width=W+'px'; fx.style.height=base.style.height=H+'px';
  drawBase(); dirty=true; }

function gridGeom(){ const step=STEP*world.scale; return { step, ox:((world.ox%step)+step)%step, oy:((world.oy%step)+step)%step }; }

// Uncolored base grid (dots or lines+dots). Redrawn only on pan/zoom/mode.
function drawBase(){ bctx.clearRect(0,0,W,H); const {step,ox,oy}=gridGeom(); if(step<6) return;
  if(P.base==='lines'){ bctx.strokeStyle=cssVar('--gridline'); bctx.lineWidth=1; bctx.beginPath();
    for(let x=ox;x<W;x+=step){bctx.moveTo(x,0);bctx.lineTo(x,H);} for(let y=oy;y<H;y+=step){bctx.moveTo(0,y);bctx.lineTo(W,y);} bctx.stroke(); }
  bctx.fillStyle=cssVar('--griddot'); const r=Math.max(1, 1.6*world.scale);
  for(let y=oy;y<H;y+=step) for(let x=ox;x<W;x+=step){ bctx.beginPath(); bctx.arc(x,y,r,0,7); bctx.fill(); } }
function cssVar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n); }

const sxOf=wx=>wx*world.scale+world.ox, syOf=wy=>wy*world.scale+world.oy;

// ---------------------------------------------------------------------------
// THE renderer — colored territory dots. No offscreen, no blur, no mask.
// For each visible grid intersection: nearest-rect distance per worktree →
// smooth falloff → dominant color wins. O(dots × panels), runs only on change.
// ---------------------------------------------------------------------------
function render(){
  ctx.clearRect(0,0,W,H);
  const { step, ox, oy } = gridGeom(); if (step < 6) return;
  const reach = P.reach, soft = P.soft;            // world px
  const baseDot = P.dot * world.scale;             // screen px

  // Pre-bucket panels by color in WORLD coords + a culling bbox (+reach).
  const groups = {};
  for (const p of panels) {
    (groups[p.wt] ||= []).push(p);
  }

  for (let sy = oy; sy < H; sy += step) {
    const wy = (sy - world.oy) / world.scale;       // world y of this dot
    for (let sx = ox; sx < W; sx += step) {
      const wx = (sx - world.ox) / world.scale;     // world x of this dot
      let bestI = 0, bestWt = null;
      for (const wt in groups) {
        let infl = 0;
        for (const p of groups[wt]) {
          const dx = Math.max(p.sx - wx, 0, wx - (p.sx + p.w));
          const dy = Math.max(p.sy - wy, 0, wy - (p.sy + p.h));
          if (dx > reach || dy > reach) continue;   // quick reject
          const d = Math.sqrt(dx*dx + dy*dy);
          // 1 inside the panel, easing to 0 at reach over a `soft` band.
          const t = d <= 0 ? 1 : 1 - smoothstep(0, soft, d - (reach - soft));
          if (t > infl) infl = t;
        }
        if (infl > bestI) { bestI = infl; bestWt = wt; }
      }
      if (bestWt && bestI > 0.02) {
        ctx.globalAlpha = Math.min(1, bestI * P.intensity);
        ctx.fillStyle = COLORS[bestWt];
        const r = baseDot * (0.45 + 0.55 * bestI);   // dots swell toward the panel
        ctx.beginPath(); ctx.arc(sx, sy, r, 0, 7); ctx.fill();
      }
    }
  }
  ctx.globalAlpha = 1;
}
function smoothstep(a,b,x){ const t=Math.min(1,Math.max(0,(x-a)/(b-a))); return t*t*(3-2*t); }

// ---------------------------------------------------------------------------
function buildPanels(){ worldEl.innerHTML='';
  for(const p of panels){ const el=document.createElement('div'); el.className='panel';
    el.style.left=p.x+'px'; el.style.top=p.y+'px'; el.style.width=p.w+'px'; el.style.height=p.h+'px';
    el.innerHTML=`<div class="bar"><span style="color:${COLORS[p.wt]}">${p.t}</span>
      <span class="chip" style="background:color-mix(in srgb, ${COLORS[p.wt]} 92%, black)">${ICON}${LABEL[p.wt]}</span></div>
      <div class="body">paulhorn@Mac ${LABEL[p.wt]} %_</div>`;
    el._p=p; p.el=el; worldEl.appendChild(el); } }
function applyWorld(){ worldEl.style.transform=`translate(${world.ox}px,${world.oy}px) scale(${world.scale})`; }

// Spring loop — but it self-parks: when nothing animates, requestAnimationFrame
// keeps ticking yet render() runs ONLY when dirty. Idle cost ≈ a no-op rAF.
let dirty=true, anim=false, frames=0, fpsT=performance.now();
function loop(now){
  const k=P.spring/100, d=0.68; let moving=false;
  for(const p of panels) for(const [pos,vel,tgt] of [['sx','vx','x'],['sy','vy','y']]){
    if(p[pos]===p[tgt] && p[vel]===0) continue;
    let v=p[vel]+(p[tgt]-p[pos])*k; v*=d; p[pos]+=v; p[vel]=v;
    if(Math.abs(v)>0.04||Math.abs(p[tgt]-p[pos])>0.04) moving=true; else {p[pos]=p[tgt];p[vel]=0;} }
  if(moving||dirty){ render(); dirty=false; }
  if(moving||dragging){ frames++; if(now-fpsT>400){ document.getElementById('fps').textContent=Math.round(frames*1000/(now-fpsT))+' fps'; frames=0; fpsT=now; } }
  else if(document.getElementById('fps').textContent!=='idle'){ document.getElementById('fps').textContent='idle'; }
  requestAnimationFrame(loop);
}

// ---------------------------------------------------------------------------
let drag=null, dragging=false;
stage.addEventListener('mousedown',e=>{ const pn=e.target.closest('.panel'); dragging=true;
  if(pn&&e.target.closest('.bar')) drag={kind:'panel',p:pn._p,mx:e.clientX,my:e.clientY,ox:pn._p.x,oy:pn._p.y};
  else { drag={kind:'pan',mx:e.clientX,my:e.clientY,ox:world.ox,oy:world.oy}; stage.classList.add('panning'); } });
addEventListener('mousemove',e=>{ if(!drag)return;
  if(drag.kind==='panel'){ drag.p.x=drag.ox+(e.clientX-drag.mx)/world.scale; drag.p.y=drag.oy+(e.clientY-drag.my)/world.scale;
    drag.p.el.style.left=drag.p.x+'px'; drag.p.el.style.top=drag.p.y+'px'; dirty=true; }
  else { world.ox=drag.ox+(e.clientX-drag.mx); world.oy=drag.oy+(e.clientY-drag.my); applyWorld(); drawBase(); dirty=true; } });
addEventListener('mouseup',()=>{ drag=null; dragging=false; stage.classList.remove('panning'); });
stage.addEventListener('wheel',e=>{ e.preventDefault(); const ns=Math.min(3,Math.max(0.25,world.scale*Math.exp(-e.deltaY*0.0015)));
  world.ox=e.clientX-(e.clientX-world.ox)*(ns/world.scale); world.oy=e.clientY-(e.clientY-world.oy)*(ns/world.scale);
  world.scale=ns; applyWorld(); drawBase(); dirty=true; },{passive:false});

// ---------------------------------------------------------------------------
function bind(id,key,fmt,scale=1){ const el=document.getElementById(id),out=document.getElementById(id+'v');
  const upd=()=>{ P[key]=(+el.value)*scale; out.textContent=fmt(P[key]); dirty=true; }; el.addEventListener('input',upd); upd(); }
bind('reach','reach',v=>v.toFixed(0));
bind('soft','soft',v=>v.toFixed(0));
bind('intensity','intensity',v=>(v*100).toFixed(0)+'%',0.01);
bind('dot','dot',v=>v.toFixed(2),0.01);
bind('spring','spring',v=>v.toFixed(0));
document.querySelectorAll('#baseMode button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#baseMode button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  P.base=b.dataset.b; drawBase(); dirty=true; }));

addEventListener('resize',resize); buildPanels(); applyWorld(); resize(); requestAnimationFrame(loop);
</script>
</body>
</html>
