<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cate · Worktree Fields — heatmap / gradient / contour (noisy)</title>
<style>
  :root { --bg:#0d1117; --grid:rgba(255,255,255,0.04); --panel:#11161d; --panel-bar:#1a212b;
    --border:rgba(140,200,180,0.16); --text:#c9d2dc; --muted:#7c8794; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text);
    font:13px/1.4 ui-sans-serif,-apple-system,system-ui,sans-serif; }
  #stage { position:fixed; inset:0; overflow:hidden; cursor:grab; } #stage.panning { cursor:grabbing; }
  #base { position:absolute; inset:0; pointer-events:none; z-index:0; }
  #fx   { position:absolute; inset:0; pointer-events:none; z-index:1; }
  #world{ position:absolute; top:0; left:0; transform-origin:0 0; z-index:2; }
  .panel { position:absolute; border-radius:8px; background:rgba(17,22,29,.92);
    border:1px solid var(--border); box-shadow:0 16px 44px -18px rgba(0,0,0,0.7); overflow:hidden; user-select:none; }
  .panel .bar { height:23px; display:flex; align-items:center; gap:7px; padding:0 9px;
    background:var(--panel-bar); border-bottom:1px solid var(--border); cursor:grab; font-size:10.5px; color:var(--muted); }
  .panel .bar .dots { display:flex; gap:4px; } .panel .bar .dots i { width:7px;height:7px;border-radius:50%;background:#2c3540; }
  .panel .body { padding:9px 11px; color:#8fa0ad; font:11px/1.6 ui-monospace,Menlo,monospace; white-space:pre; }
  .panel .body .k { color:#5fd6b0; }

  #ui { position:fixed; top:14px; left:14px; z-index:10; width:248px; background:rgba(13,17,23,.94);
    backdrop-filter:blur(10px); border:1px solid var(--border); border-radius:12px; padding:13px 14px;
    box-shadow:0 18px 50px -18px rgba(0,0,0,.7); }
  #ui h1 { font-size:12px; font-weight:700; letter-spacing:.3px; }
  #ui .sub { color:var(--muted); font-size:10.5px; margin:2px 0 11px; }
  .seg { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:12px; }
  .seg button { padding:8px 4px; border-radius:8px; border:1px solid var(--border); background:rgba(255,255,255,.03);
    color:var(--text); font-size:10.5px; cursor:pointer; }
  .seg button.on { background:#2dd4bf; border-color:#2dd4bf; color:#06231a; font-weight:700; }
  .row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:8px 0; }
  .row label { color:var(--muted); font-size:11px; } .row output { color:var(--text); font:10.5px ui-monospace; min-width:34px; text-align:right; }
  input[type=range] { width:118px; accent-color:#2dd4bf; }
  .chk { display:flex; align-items:center; gap:7px; margin-top:8px; color:var(--muted); font-size:11px; cursor:pointer; }
  .hint { color:var(--muted); font-size:10px; margin-top:11px; line-height:1.5; }
  .fps { position:fixed; top:14px; right:14px; z-index:10; font:11px ui-monospace; color:var(--muted);
    background:rgba(13,17,23,.85); border:1px solid var(--border); padding:5px 9px; border-radius:8px; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="base"></canvas>
    <canvas id="fx"></canvas>
    <div id="world"></div>
  </div>

  <div id="ui">
    <h1>Worktree Fields</h1>
    <div class="sub">noisy scalar field · domain-warped · imperfect</div>
    <div class="seg" id="variants">
      <button data-v="heatmap" class="on">Heatmap</button>
      <button data-v="gradient">Gradient</button>
      <button data-v="contour">Contour</button>
    </div>
    <div class="row"><label>Reach</label><input id="reach" type="range" min="40" max="360" value="150"><output id="reachv"></output></div>
    <div class="row"><label>Wobble</label><input id="warp" type="range" min="0" max="120" value="30"><output id="warpv"></output></div>
    <div class="row"><label>Detail</label><input id="freq" type="range" min="2" max="40" value="7"><output id="freqv"></output></div>
    <div class="row"><label>Intensity</label><input id="intensity" type="range" min="20" max="100" value="70"><output id="intensityv"></output></div>
    <div class="row"><label>Lines</label><input id="lines" type="range" min="4" max="22" value="13"><output id="linesv"></output></div>
    <label class="chk"><input type="checkbox" id="animate" checked> jiggle (animate)</label>
    <div class="hint">Drag a title bar to move a panel · drag bg to pan · scroll to zoom.</div>
  </div>
  <div class="fps" id="fps">–</div>

<script>
const WTS = ['a','b','c'];
const COLORS = { a:'#2dd4bf', b:'#fbbf24', c:'#60a5fa' };
const RGB    = { a:[45,212,191], b:[251,191,36], c:[96,165,250] };
const LABEL  = { a:'slave', b:'slave-2', c:'feature-x' };

let panels = [
  { x:120, y:200, w:300, h:190, wt:'a', t:'terminal', body:'> build\n<span class="k">✓</span> Compiled in 842ms' },
  { x:500, y:120, w:300, h:200, wt:'a', t:'main.py',  body:'import core\nfrom api import client\n\ndef start():\n  core.run()' },
  { x:470, y:430, w:330, h:190, wt:'b', t:'db',       body:'> select * from users\n<span class="k">✓</span> 128 rows' },
  { x:880, y:300, w:310, h:200, wt:'b', t:'worker.ts',body:'export async function job(){\n  while(true){ await run() }\n}' },
  { x:960, y:600, w:300, h:180, wt:'c', t:'metrics',  body:'CPU  23%\nRAM  42%\nNET  18%' },
].map(p => ({ ...p, sx:p.x, sy:p.y, vx:0, vy:0 }));

const world = { ox:0, oy:0, scale:1 };
const P = { variant:'heatmap', reach:150, warp:30, freq:7, intensity:0.70, lines:13, animate:true };
const CELL = 9;        // screen-px sampling resolution for the smooth field
const GRID = 40;       // world-px canvas grid step (heatmap blocks snap to this)
const CORNER = 18;     // territory rounds the panel corners (world px)
const SMINK = 52;      // smooth-merge radius between same-worktree panels

const stage=document.getElementById('stage'), worldEl=document.getElementById('world');
const fx=document.getElementById('fx'), ctx=fx.getContext('2d');
const base=document.getElementById('base'), bctx=base.getContext('2d');
const tiny=document.createElement('canvas'), tctx=tiny.getContext('2d');
let DPR=Math.min(devicePixelRatio||1,2), W=0,H=0, cols=0, rows=0;
const fields={};

function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
  for(const c of [fx,base]){ c.width=W*DPR; c.height=H*DPR; } for(const x of [ctx,bctx]) x.setTransform(DPR,0,0,DPR,0,0);
  fx.style.width=base.style.width=W+'px'; fx.style.height=base.style.height=H+'px'; drawBase(); dirty=true; }
function drawBase(){ bctx.clearRect(0,0,W,H); const step=40*world.scale; if(step<6)return;
  const ox=((world.ox%step)+step)%step, oy=((world.oy%step)+step)%step;
  // Line grid — matches the app canvas.
  bctx.strokeStyle='rgba(255,255,255,0.05)'; bctx.lineWidth=1; bctx.beginPath();
  for(let x=ox;x<W;x+=step){ bctx.moveTo(x+.5,0); bctx.lineTo(x+.5,H); }
  for(let y=oy;y<H;y+=step){ bctx.moveTo(0,y+.5); bctx.lineTo(W,y+.5); }
  bctx.stroke(); }

// ---------- noise ----------------------------------------------------------
function hash(x,y){ let h=(x|0)*374761393 + (y|0)*668265263; h=(h^(h>>13))*1274126177; return ((h^(h>>16))>>>0)/4294967295; }
function vnoise(x,y){ const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
  const u=xf*xf*(3-2*xf), v=yf*yf*(3-2*yf);
  const a=hash(xi,yi),b=hash(xi+1,yi),c=hash(xi,yi+1),d=hash(xi+1,yi+1);
  return a*(1-u)*(1-v)+b*u*(1-v)+c*(1-u)*v+d*u*v; }
function fbm(x,y){ let s=0,a=0.5,f=1; for(let i=0;i<3;i++){ s+=a*vnoise(x*f,y*f); f*=2; a*=0.5; } return s; }
function smoothstep(a,b,x){ const t=Math.min(1,Math.max(0,(x-a)/(b-a))); return t*t*(3-2*t); }

// Signed distance to a rounded rectangle (negative inside). Smooth, so iso-
// lines hug the panel with rounded corners instead of sharp ones.
function sdRoundRect(px,py, x,y,w,h, r){
  const cx=x+w/2, cy=y+h/2, hx=w/2-r, hy=h/2-r;
  const qx=Math.abs(px-cx)-hx, qy=Math.abs(py-cy)-hy;
  const ax=Math.max(qx,0), ay=Math.max(qy,0);
  return Math.sqrt(ax*ax+ay*ay) + Math.min(Math.max(qx,qy),0) - r;
}
// Polynomial smooth-min (iq) — merges two distances without a kink.
function smin(a,b,k){ if(k<=0) return Math.min(a,b); const h=Math.max(k-Math.abs(a-b),0)/k; return Math.min(a,b)-h*h*k*0.25; }

// ---------- field: per-worktree SIGNED DISTANCE (world px) ------------------
let byColor={};
function computeFields(t){
  cols=Math.ceil(W/CELL)+1; rows=Math.ceil(H/CELL)+1;
  for(const wt of WTS) fields[wt]=new Float32Array(cols*rows);
  byColor={}; for(const p of panels)(byColor[p.wt] ||= []).push(p);
  const warp=P.warp, freq=P.freq/1000;
  for(let gy=0; gy<rows; gy++){ for(let gx=0; gx<cols; gx++){ const i=gy*cols+gx;
    const wx=(gx*CELL-world.ox)/world.scale, wy=(gy*CELL-world.oy)/world.scale;
    // gentle low-frequency domain warp → organic but smooth edges
    const nx=wx + (fbm(wx*freq + t, wy*freq)-0.5)*2*warp;
    const ny=wy + (fbm(wx*freq+31.4, wy*freq - t)-0.5)*2*warp;
    for(const wt of WTS){ const list=byColor[wt]; if(!list){ fields[wt][i]=1e9; continue; }
      let d=1e9; for(const p of list){ d=smin(d, sdRoundRect(nx,ny,p.sx,p.sy,p.w,p.h,CORNER), SMINK); }
      fields[wt][i]=d;
    }
  } }
}
/** Nearest worktree at a fine-field cell, and its signed distance. */
function dominantAt(i){ let bd=1e9, bw=null; for(const wt of WTS){ const d=fields[wt][i]; if(d<bd){ bd=d; bw=wt; } } return [bw,bd]; }

// ---------- variants -------------------------------------------------------
function rr(c,x,y,w,h,r){ r=Math.min(r,w/2,h/2); c.beginPath(); c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

function renderHeatmap(){
  // Blocks snap to the 40px canvas grid cells (aligned to the line grid).
  const step=GRID*world.scale; if(step<6) return;
  const ox=((world.ox%step)+step)%step, oy=((world.oy%step)+step)%step;
  const reach=P.reach, t=P.animate?performance.now()/700:0;
  for(let by=oy-step; by<H; by+=step){ for(let bx=ox-step; bx<W; bx+=step){
    const ccx=bx+step/2, ccy=by+step/2;
    const gx=Math.min(cols-1,Math.max(0,Math.round(ccx/CELL))), gy=Math.min(rows-1,Math.max(0,Math.round(ccy/CELL)));
    const [bw,bd]=dominantAt(gy*cols+gx);
    if(bw==null) continue;
    let infl = bd<=0 ? 1 : 1-smoothstep(0, reach, bd); if(infl<=0.05) continue;
    infl *= 0.7 + 0.3*vnoise(bx*0.05+t, by*0.05);             // grain
    ctx.globalAlpha=Math.min(1, Math.pow(infl,0.85)*P.intensity);
    ctx.fillStyle=COLORS[bw];
    ctx.fillRect(bx+1, by+1, step-2, step-2);                  // 1px gap = grid look
  } }
  ctx.globalAlpha=1;
}

// Smooth filled territory fade (distance falloff, tight denser core). `mul`
// scales opacity so the contour variant can lay a faint version under its rings.
function fillGradient(mul){
  tiny.width=cols; tiny.height=rows; const img=tctx.createImageData(cols,rows); const data=img.data;
  const reach=P.reach;
  for(let i=0;i<cols*rows;i++){ const [bw,bd]=dominantAt(i); if(bw==null) continue;
    let infl = bd<=0 ? 1 : 1-smoothstep(0, reach, bd); if(infl<=0.02) continue;
    infl = Math.pow(infl, 1.6);                                // tight, denser core
    const [r,g,b]=RGB[bw]; data[i*4]=r; data[i*4+1]=g; data[i*4+2]=b;
    data[i*4+3]=Math.min(1, infl*P.intensity*mul)*255;
  }
  tctx.putImageData(img,0,0);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  ctx.drawImage(tiny, 0,0,cols,rows, -CELL/2,-CELL/2, cols*CELL, rows*CELL);
}
// Fill the region where distance < thr, as crisp marching-squares polygons
// (smooth piecewise-linear band edges, NO bilinear bleed). One worktree colour.
function fillBelow(field, thr, color, alpha){
  ctx.fillStyle=color; ctx.globalAlpha=alpha;
  for(let gy=0; gy<rows-1; gy++){ for(let gx=0; gx<cols-1; gx++){
    const i=gy*cols+gx, tl=field[i],tr=field[i+1],br=field[i+cols+1],bl=field[i+cols];
    const n=(tl<thr)+(tr<thr)+(br<thr)+(bl<thr); if(n===0) continue;
    const x0=gx*CELL, y0=gy*CELL, x1=x0+CELL, y1=y0+CELL;
    if(n===4){ ctx.fillRect(x0,y0,CELL,CELL); continue; }
    const T=(a,b)=>(thr-a)/(b-a), pts=[];
    if(tl<thr) pts.push(x0,y0);
    if((tl<thr)!==(tr<thr)) pts.push(x0+CELL*T(tl,tr), y0);
    if(tr<thr) pts.push(x1,y0);
    if((tr<thr)!==(br<thr)) pts.push(x1, y0+CELL*T(tr,br));
    if(br<thr) pts.push(x1,y1);
    if((br<thr)!==(bl<thr)) pts.push(x0+CELL*T(bl,br), y1);
    if(bl<thr) pts.push(x0,y1);
    if((bl<thr)!==(tl<thr)) pts.push(x0, y0+CELL*T(tl,bl));
    if(pts.length<6) continue;
    ctx.beginPath(); ctx.moveTo(pts[0],pts[1]); for(let k=2;k<pts.length;k+=2) ctx.lineTo(pts[k],pts[k+1]); ctx.closePath(); ctx.fill();
  } }
  ctx.globalAlpha=1;
}

// Terraced topology layers — discrete elevation steps whose edges land exactly
// on the contour rings (same iso-distance levels). Stacked outer→inner so the
// cumulative opacity steps up toward the panels and fades outward (Concept 02).
function renderGradient(){
  const n=P.lines, spacing=P.reach/n;
  const a = 1 - Math.pow(1 - Math.min(0.95, P.intensity), 1/n);   // per-layer increment
  for(const wt of WTS){ if(!(byColor[wt]||[]).length) continue;
    for(let k=n; k>=1; k--) fillBelow(fields[wt], k*spacing, COLORS[wt], a); }
}

// marching squares isolines on a colour's field
function contourColor(field, thr, color, alpha, lw){
  ctx.strokeStyle=color; ctx.globalAlpha=alpha; ctx.lineWidth=lw; ctx.beginPath();
  for(let gy=0; gy<rows-1; gy++) for(let gx=0; gx<cols-1; gx++){
    const i=gy*cols+gx, tl=field[i], tr=field[i+1], br=field[i+cols+1], bl=field[i+cols];
    let c=0; if(tl>thr)c|=8; if(tr>thr)c|=4; if(br>thr)c|=2; if(bl>thr)c|=1; if(c===0||c===15) continue;
    const x0=gx*CELL, y0=gy*CELL, T=(a,b)=>(thr-a)/(b-a);
    const TP=[x0+CELL*T(tl,tr),y0], RP=[x0+CELL,y0+CELL*T(tr,br)], BP=[x0+CELL*T(bl,br),y0+CELL], LP=[x0,y0+CELL*T(tl,bl)];
    const S=(p,q)=>{ctx.moveTo(p[0],p[1]); ctx.lineTo(q[0],q[1]);};
    switch(c){ case 1:S(LP,BP);break; case 2:S(BP,RP);break; case 3:S(LP,RP);break; case 4:S(TP,RP);break;
      case 5:S(LP,TP);S(BP,RP);break; case 6:S(TP,BP);break; case 7:S(LP,TP);break; case 8:S(TP,LP);break;
      case 9:S(TP,BP);break; case 10:S(TP,RP);S(LP,BP);break; case 11:S(TP,RP);break; case 12:S(LP,RP);break;
      case 13:S(BP,RP);break; case 14:S(LP,BP);break; }
  }
  ctx.stroke(); ctx.globalAlpha=1;
}
function renderContour(){
  fillGradient(0.3);                 // faint filled fade beneath the rings
  ctx.lineJoin='round'; ctx.lineCap='round';
  // Iso-distance lines: d = 0 traces the panel outline, each next line is one
  // `spacing` further out → nested topographic rings hugging the panels.
  const n=P.lines, spacing=P.reach/n;
  for(const wt of WTS){ if(!(byColor[wt]||[]).length) continue;
    for(let k=0;k<=n;k++){ const L=k*spacing; const f=1-k/n;       // 1 inner → 0 outer
      const a=P.intensity*0.6*f*f + 0.03;                           // quadratic fade outward
      contourColor(fields[wt], L, COLORS[wt], a, k===0?1.4:0.9); } }
}

function render(t){ ctx.clearRect(0,0,W,H); computeFields(t);
  if(P.variant==='heatmap') renderHeatmap();
  else if(P.variant==='gradient') renderGradient();
  else renderContour(); }

// ---------- panels / loop / interaction ------------------------------------
function buildPanels(){ worldEl.innerHTML='';
  for(const p of panels){ const el=document.createElement('div'); el.className='panel';
    el.style.left=p.x+'px'; el.style.top=p.y+'px'; el.style.width=p.w+'px'; el.style.height=p.h+'px';
    el.innerHTML=`<div class="bar"><span class="dots"><i></i><i></i><i></i></span><span style="color:${COLORS[p.wt]}">${p.t}</span></div><div class="body">${p.body}</div>`;
    el._p=p; p.el=el; worldEl.appendChild(el); } }
function applyWorld(){ worldEl.style.transform=`translate(${world.ox}px,${world.oy}px) scale(${world.scale})`; }

let dirty=true, frames=0, fpsT=performance.now();
function loop(now){ const k=P.spring||0.22, d=0.68; let moving=false;
  for(const p of panels) for(const [pos,vel,tgt] of [['sx','vx','x'],['sy','vy','y']]){
    if(p[pos]===p[tgt]&&p[vel]===0) continue; let v=p[vel]+(p[tgt]-p[pos])*k; v*=d; p[pos]+=v; p[vel]=v;
    if(Math.abs(v)>0.04||Math.abs(p[tgt]-p[pos])>0.04) moving=true; else {p[pos]=p[tgt];p[vel]=0;} }
  const t = P.animate ? now/1000*0.18 : 0;
  if(moving||dirty||P.animate){ render(t); dirty=false; }
  frames++; if(now-fpsT>500){ document.getElementById('fps').textContent=Math.round(frames*1000/(now-fpsT))+' fps'; frames=0; fpsT=now; }
  requestAnimationFrame(loop); }

let drag=null;
stage.addEventListener('mousedown',e=>{ const pn=e.target.closest('.panel');
  if(pn&&e.target.closest('.bar')) drag={kind:'panel',p:pn._p,mx:e.clientX,my:e.clientY,ox:pn._p.x,oy:pn._p.y};
  else { drag={kind:'pan',mx:e.clientX,my:e.clientY,ox:world.ox,oy:world.oy}; stage.classList.add('panning'); } });
addEventListener('mousemove',e=>{ if(!drag)return;
  if(drag.kind==='panel'){ drag.p.x=drag.ox+(e.clientX-drag.mx)/world.scale; drag.p.y=drag.oy+(e.clientY-drag.my)/world.scale;
    drag.p.el.style.left=drag.p.x+'px'; drag.p.el.style.top=drag.p.y+'px'; dirty=true; }
  else { world.ox=drag.ox+(e.clientX-drag.mx); world.oy=drag.oy+(e.clientY-drag.my); applyWorld(); drawBase(); dirty=true; } });
addEventListener('mouseup',()=>{ drag=null; stage.classList.remove('panning'); });
stage.addEventListener('wheel',e=>{ e.preventDefault(); const ns=Math.min(3,Math.max(0.25,world.scale*Math.exp(-e.deltaY*0.0015)));
  world.ox=e.clientX-(e.clientX-world.ox)*(ns/world.scale); world.oy=e.clientY-(e.clientY-world.oy)*(ns/world.scale);
  world.scale=ns; applyWorld(); drawBase(); dirty=true; },{passive:false});

function bind(id,key,fmt,scale=1){ const el=document.getElementById(id),out=document.getElementById(id+'v');
  const upd=()=>{ P[key]=(+el.value)*scale; out.textContent=fmt(P[key]); dirty=true; }; el.addEventListener('input',upd); upd(); }
bind('reach','reach',v=>v.toFixed(0)); bind('warp','warp',v=>v.toFixed(0)); bind('freq','freq',v=>v.toFixed(0));
bind('intensity','intensity',v=>(v*100).toFixed(0)+'%',0.01); bind('lines','lines',v=>v.toFixed(0));
document.getElementById('animate').addEventListener('change',e=>{ P.animate=e.target.checked; dirty=true; });
document.querySelectorAll('#variants button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#variants button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); P.variant=b.dataset.v; dirty=true; }));

addEventListener('resize',resize); buildPanels(); applyWorld(); resize(); requestAnimationFrame(loop);
</script>
</body>
</html>
